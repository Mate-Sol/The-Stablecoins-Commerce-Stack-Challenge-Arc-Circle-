[profile.default]
src = "src"
out = "out"
libs = ["lib"]
gas_limit = 100_000_000_000
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read", path = "./"}]

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 1000
depth = 200
