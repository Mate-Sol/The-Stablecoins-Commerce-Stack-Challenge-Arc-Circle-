# =====================================================================
#  Name: Arc-UI-CICD
#  Description: Build Docker image for the Arc v2 lender UI (Vite/nginx),
#               run security scans, and deploy to Google Kubernetes Engine (GKE)
#  Trigger: On push to 'main' (client/** changes) or manual workflow dispatch
# =====================================================================

name: Arc-UI-CICD

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write
  security-events: write

on:
  push:
    branches: ["main"]
    paths:
      - "client/**"
      - ".github/workflows/arc-ui-cicd.yml"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: matesol/arc-ui
  GKE_CLUSTER: im-prod
  GKE_ZONE: us-central1
  NAMESPACE: arc-hackathon
  DEPLOYMENT_NAME: arc-ui
  CI: false

jobs:
  # 🔑 1️⃣ Secret Scanning
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: zricethezav/gitleaks-action@v2
        with:
          config-path: gitleaks.toml
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # 📦 2️⃣ Dependency + IaC Scan
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          format: cyclonedx
          output: sbom.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # 🐳 3️⃣ Build & Push Docker Image
  build:
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache/*

          echo "After cleanup:"
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_UNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          no-cache: true
          tags: ${{ env.IMAGE_NAME }}:main
          labels: ${{ steps.meta.outputs.labels }}

  # 🔍 4️⃣ Scan Built Docker Image
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_UNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Pull Image
        run: docker pull ${{ env.IMAGE_NAME }}:main

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:main
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
          scanners: vuln

  # 🧾 5️⃣ Generate Provenance (SLSA)
  # provenance:
  #   runs-on: ubuntu-latest
  #   needs: build
  #   steps:
  #     - uses: slsa-framework/slsa-github-generator@v2.0.0

  # 🚀 6️⃣ Deploy to Google Kubernetes Engine (GKE)
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GKE_BETA_CREDS }}"

      - name: Set up GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Verify GKE cluster connection
        run: kubectl get nodes

      - name: Restart GKE deployment
        run: kubectl rollout restart deployment/${{ env.DEPLOYMENT_NAME }} --namespace ${{ env.NAMESPACE }}

      - name: Check rollout status
        run: kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} --namespace ${{ env.NAMESPACE }} --timeout=180s
