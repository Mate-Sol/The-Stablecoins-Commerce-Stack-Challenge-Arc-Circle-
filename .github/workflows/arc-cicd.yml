# =====================================================================
#  Name: Arc-CICD
#  Description: Build Docker images for the 3 Arc services (arc-ui, arc-admin,
#               arc-be), run security scans, and deploy each to Google
#               Kubernetes Engine (GKE). One matrix entry per service.
#  Trigger: On push to 'main' (client/**, client-legacy/**, server/**) or
#           manual workflow dispatch
# =====================================================================

name: Arc-CICD

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write
  security-events: write

on:
  push:
    branches: ["main"]
    paths:
      - "client/**"
      - "client-legacy/**"
      - "server/**"
      - ".github/workflows/arc-cicd.yml"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  GKE_CLUSTER: beta-env          # beta cluster — NOT prod (im-prod)
  GKE_ZONE: us-central1-a
  NAMESPACE: arc-hackathon
  CI: false

jobs:
  # 🔑 1️⃣ Secret Scanning (repo-wide, runs once)
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: zricethezav/gitleaks-action@v2
        with:
          config-path: gitleaks.toml
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # 📦 2️⃣ Dependency + IaC Scan (repo-wide, runs once)
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          format: cyclonedx
          output: sbom.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # 🐳🔍🚀 3️⃣ Build → Scan image → Deploy (one run per service)
  build-scan-deploy:
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: arc-ui
            image: matesol/arc-ui
            context: ./client
            deployment: arc-ui
          - service: arc-admin
            image: matesol/arc-admin
            context: ./client-legacy
            deployment: arc-admin
          - service: arc-be
            image: matesol/arc-be
            context: ./server
            deployment: arc-be

    name: build-scan-deploy (${{ matrix.service }})

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache/*

          echo "After cleanup:"
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_UNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          no-cache: true
          tags: ${{ matrix.image }}:main
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ matrix.image }}:main
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
          scanners: vuln

      # 🧾 Generate Provenance (SLSA) — optional, enable if needed
      # - uses: slsa-framework/slsa-github-generator@v2.0.0

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.BETA_GKE_WIF_PROVIDER }}
          service_account: ${{ secrets.BETA_GKE_GKE_SA }}

      - name: Set up GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Verify GKE cluster connection
        run: kubectl get nodes

      - name: Restart GKE deployment
        run: kubectl rollout restart deployment/${{ matrix.deployment }} --namespace ${{ env.NAMESPACE }}

      - name: Check rollout status
        run: kubectl rollout status deployment/${{ matrix.deployment }} --namespace ${{ env.NAMESPACE }} --timeout=180s
